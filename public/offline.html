<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Daimon — offline</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;font-family:-apple-system,system-ui,sans-serif;background:#040a14;color:#fff}
  body{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;text-align:center}
  .emblem{width:72px;height:72px;border-radius:22px;background:linear-gradient(135deg,rgba(58,188,168,.15),rgba(58,188,168,.05));border:1px solid rgba(58,188,168,.35);display:flex;align-items:center;justify-content:center;margin-bottom:24px;box-shadow:0 0 40px rgba(58,188,168,.25)}
  h1{font-family:'Cinzel',serif;font-size:28px;font-weight:700;letter-spacing:.12em;margin-bottom:12px}
  p{color:rgba(255,255,255,.55);line-height:1.5;max-width:320px;margin-bottom:24px;font-size:14px}
  button{background:#3ABCA8;color:#fff;font-weight:700;letter-spacing:.04em;border:none;border-radius:12px;padding:13px 28px;font-size:14px;cursor:pointer;box-shadow:0 4px 20px rgba(58,188,168,.35)}
  button:active{transform:translateY(1px)}
</style>
</head>
<body>
  <div class="emblem">
    <svg width="38" height="38" viewBox="0 0 24 24" fill="none">
      <path d="M4.5 4.5L19.5 19.5" stroke="rgba(58,188,168,.8)" stroke-width="1.4" stroke-linecap="round"/>
      <path d="M13 17L17 13" stroke="rgba(58,188,168,1)" stroke-width="2" stroke-linecap="round"/>
      <circle cx="19.5" cy="19.5" r="1.3" fill="rgba(58,188,168,.7)"/>
      <path d="M19.5 4.5L4.5 19.5" stroke="rgba(58,188,168,.8)" stroke-width="1.4" stroke-linecap="round"/>
      <path d="M7 13L11 17" stroke="rgba(58,188,168,1)" stroke-width="2" stroke-linecap="round"/>
      <circle cx="4.5" cy="19.5" r="1.3" fill="rgba(58,188,168,.7)"/>
    </svg>
  </div>
  <h1>DAIMON</h1>
  <p>Sei senza connessione. Controlla la rete e riprova: i progressi non si perdono.</p>
  <button onclick="location.reload()">Riprova</button>
</body>
</html>
